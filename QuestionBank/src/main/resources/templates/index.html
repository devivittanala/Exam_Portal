<!DOCTYPE html>
<html lang="en" data-bs-theme="dark" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ExamCloud Pro - Authentication Gateway</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
        }
        [data-bs-theme="light"] .glass-card {
            background: rgba(255, 255, 255, 0.85);
            border: 1px solid rgba(0, 0, 0, 0.06);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
        }
        [data-bs-theme="light"] body {
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
        }
        .nav-pills .nav-link {
            color: #94a3b8;
            font-weight: 500;
            border-radius: 8px;
            transition: all 0.3s ease;
        }
        .nav-pills .nav-link.active {
            background-color: #3b82f6;
            color: white;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }
        .theme-btn {
            width: 45px;
            height: 45px;
            border-radius: 50%;
        }
    </style>
</head>
<body>

    <!-- ── Hidden flag: tells JS which tab to open ───────────────── -->
    <!-- "register" if registerError or registerSuccess is present, else "login" -->
    <input type="hidden" id="activeTab"
           th:value="${registerError != null or registerSuccess != null} ? 'register' : 'login'">

    <!-- Theme Toggle -->
    <button class="btn btn-outline-secondary position-absolute top-0 end-0 m-4 theme-btn"
            onclick="toggleTheme()" aria-label="Toggle Theme">
        <i class="bi bi-brightness-high-fill text-warning" id="theme-icon-light"></i>
        <i class="bi bi-moon-stars-fill text-primary d-none"  id="theme-icon-dark"></i>
    </button>

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-12 col-sm-10 col-md-8 col-lg-5">

                <!-- Brand -->
                <div class="text-center mb-4">
                    <h1 class="h2 fw-bold text-primary mb-1">
                        <i class="bi bi-cloud-check-fill me-2"></i>ExamCloud Pro
                    </h1>
                    <p class="text-muted small">Enterprise Examination &amp; Assessment Orchestrator</p>
                </div>

                <div class="glass-card p-4 p-sm-5">

                    <!-- Tabs -->
                    <ul class="nav nav-pills nav-fill mb-4 p-1 bg-dark bg-opacity-25 rounded-3"
                        id="auth-tab" role="tablist">
                        <li class="nav-item" role="presentation">
                            <button class="nav-link active" id="login-tab"
                                    data-bs-toggle="pill"
                                    data-bs-target="#login-pane"
                                    type="button" role="tab"
                                    aria-controls="login-pane" aria-selected="true">
                                Sign In
                            </button>
                        </li>
                        <li class="nav-item" role="presentation">
                            <button class="nav-link" id="register-tab"
                                    data-bs-toggle="pill"
                                    data-bs-target="#register-pane"
                                    type="button" role="tab"
                                    aria-controls="register-pane" aria-selected="false">
                                Register
                            </button>
                        </li>
                    </ul>

                    <div class="tab-content" id="auth-tabContent">

                        <!-- ── Login Tab ───────────────────────────────────── -->
                        <div class="tab-pane fade show active" id="login-pane"
                             role="tabpanel" aria-labelledby="login-tab">
                            <h3 class="h4 fw-semibold mb-3">Welcome Back</h3>

                            <div class="alert alert-danger"
                                 th:if="${loginError}" th:text="${loginError}"></div>
                            <div class="alert alert-success"
                                 th:if="${loginSuccess}" th:text="${loginSuccess}"></div>

                            <form th:action="@{/auth/login}" method="POST">
                                <div class="mb-3">
                                    <label class="form-label text-muted small fw-medium">Email Address</label>
                                    <div class="input-group">
                                        <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                                        <input type="email" name="email" class="form-control"
                                               placeholder="name@university.edu" required>
                                    </div>
                                </div>
                                <div class="mb-4">
                                    <label class="form-label text-muted small fw-medium">Password</label>
                                    <div class="input-group">
                                        <span class="input-group-text"><i class="bi bi-lock"></i></span>
                                        <input type="password" name="password" class="form-control"
                                               placeholder="••••••••" required>
                                    </div>
                                </div>
                                <button type="submit"
                                        class="btn btn-primary w-100 py-2 fw-semibold shadow-sm">
                                    Authenticate <i class="bi bi-arrow-right ms-1"></i>
                                </button>
                            </form>

                            <p class="text-center text-muted small mt-3 mb-0">
                                No account?
                                <a href="#" onclick="switchTab('register')"
                                   class="text-primary fw-medium text-decoration-none">Register here</a>
                            </p>
                        </div>

                        <!-- ── Register Tab ────────────────────────────────── -->
                        <div class="tab-pane fade" id="register-pane"
                             role="tabpanel" aria-labelledby="register-tab">
                            <h3 class="h4 fw-semibold mb-3">Create Account</h3>

                            <div class="alert alert-danger"
                                 th:if="${registerError}" th:text="${registerError}"></div>
                            <div class="alert alert-success"
                                 th:if="${registerSuccess}" th:text="${registerSuccess}"></div>

                            <form th:action="@{/auth/register}" method="POST">
                                <div class="mb-3">
                                    <label class="form-label text-muted small fw-medium">Full Name</label>
                                    <div class="input-group">
                                        <span class="input-group-text"><i class="bi bi-person"></i></span>
                                        <input type="text" name="name" class="form-control"
                                               placeholder="John Doe" required>
                                    </div>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label text-muted small fw-medium">Email Address</label>
                                    <div class="input-group">
                                        <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                                        <input type="email" name="email" class="form-control"
                                               placeholder="name@university.edu" required>
                                    </div>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label text-muted small fw-medium">Password</label>
                                    <div class="input-group">
                                        <span class="input-group-text"><i class="bi bi-lock"></i></span>
                                        <input type="password" name="password" class="form-control"
                                               placeholder="••••••••" required>
                                    </div>
                                </div>
                                <div class="mb-4">
                                    <label class="form-label text-muted small fw-medium">System Role</label>
                                    <div class="input-group">
                                        <span class="input-group-text"><i class="bi bi-shield-lock"></i></span>
                                        <select class="form-select" name="role">
                                            <option value="STUDENT">Student Scholar</option>
                                            <option value="FACULTY">Faculty Instructor</option>
                                            <option value="ADMIN">SysAdmin Manager</option>
                                        </select>
                                    </div>
                                </div>
                                <button type="submit"
                                        class="btn btn-primary w-100 py-2 fw-semibold shadow-sm">
                                    Register Profile <i class="bi bi-check-circle ms-1"></i>
                                </button>
                            </form>

                            <p class="text-center text-muted small mt-3 mb-0">
                                Already registered?
                                <a href="#" onclick="switchTab('login')"
                                   class="text-primary fw-medium text-decoration-none">Sign in here</a>
                            </p>
                        </div>

                    </div><!-- /tab-content -->
                </div><!-- /glass-card -->
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        /* ── Theme ─────────────────────────────────────── */
        const initTheme = () => {
            const saved = localStorage.getItem('theme') || 'dark';
            applyTheme(saved);
        };

        const toggleTheme = () => {
            const current = document.documentElement.getAttribute('data-bs-theme');
            const next = current === 'dark' ? 'light' : 'dark';
            localStorage.setItem('theme', next);
            applyTheme(next);
        };

        const applyTheme = (theme) => {
            document.documentElement.setAttribute('data-bs-theme', theme);
            document.getElementById('theme-icon-light').classList.toggle('d-none', theme !== 'dark');
            document.getElementById('theme-icon-dark').classList.toggle('d-none', theme !== 'light');
        };

        /* ── Tab switching helper ──────────────────────── */
        const switchTab = (which) => {
            const target = document.querySelector(
                `#auth-tab button[data-bs-target="#${which}-pane"]`
            );
            if (target) bootstrap.Tab.getOrCreateInstance(target).show();
        };

        /* ── On load ───────────────────────────────────── */
        window.addEventListener('DOMContentLoaded', () => {
            initTheme();

            // Read the flag set by Thymeleaf
            const activeTab = document.getElementById('activeTab').value;
            if (activeTab === 'register') {
                switchTab('register');
            }
        });
    </script>
</body>
</html>
